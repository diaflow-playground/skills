          type: string
          nullable: true
          description: AI writing style preset.
          enum: [Expert, Balanced, Creative]
        personalPrompt:
          type: string
          nullable: true
          description: Custom AI prompt for the document.
        displayMode:
          type: string
          nullable: true
          description: Document display mode in the UI.
        writingLength:
          type: string
          nullable: true
          description: AI writing length preset.
          enum: [Auto, Short, Long]
        writingLengthNumber:
          type: integer
          nullable: true
          description: Custom writing length in tokens.
        vectorSource:
          type: string
          nullable: true
          description: Knowledge source mode for AI features.
          example: "notUsingKnowledgeSource"
        vectorFileIds:
          type: array
          nullable: true
          description: Specific vector file IDs to use as knowledge source.
          items:
            type: integer
        vectorGroupIds:
          type: array
          nullable: true
          description: Vector group IDs to use as knowledge source.
          items:
            type: integer
        llmModel:
          type: string
          nullable: true
          description: LLM model used for AI features.
          example: "gpt-5-mini"
        llmProvider:
          type: string
          nullable: true
          description: LLM provider name.
          example: "Open AI"
        llmCustomConfig:
          type: object
          nullable: true
          description: Custom LLM parameters for this document.
          properties:
            top_p:
              type: number
              example: 0.9
            max_length:
              type: integer
              example: 4000
            temperature:
              type: number
              example: 0.65
            presence_penalty:
              type: number
              example: 0.1
            frequency_penalty:
              type: number
              example: 0.5
        workspaceId:
          type: integer
          description: Workspace this document belongs to.
          example: 256
        creatorId:
          type: integer
          description: User ID of the document creator.
          example: 100
        ownerId:
          type: integer
          description: User ID of the document owner.
          example: 100
        lastEditorId:
          type: integer
          description: User ID of the last editor.
          example: 100
        isDraft:
          type: boolean
          description: Whether the document is a draft.
          example: false
        creator:
          $ref: "#/components/schemas/DocumentUser"
        lastEditor:
          $ref: "#/components/schemas/DocumentUser"
        owner:
          $ref: "#/components/schemas/DocumentUser"
        sessionId:
          type: string
          nullable: true
          description: Active editing session ID.
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Soft deletion timestamp.
        usage:
          type: array
          description: Usage/credit consumption records for AI operations.
          items:
            type: object
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-02-26T10:22:01.161286Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-02-26T10:24:38.122122Z"

    DocumentUser:
      type: object
      description: Abbreviated user profile embedded in document responses.
      properties:
        id:
          type: integer
          description: User ID.
          example: 100
        email:
          type: string
          description: User email address.
          example: "user@example.com"
        credit:
          type: number
          nullable: true
          description: User credit balance.
        fullName:
          type: string
          description: Full display name.
          example: "Jane Doe"
        avatar:
          type: string
          nullable: true
          description: Avatar URL.
          example: "https://example.com/avatar.jpg"
        color:
          type: string
          nullable: true
          description: User color hex code for UI display.
          example: "#9c899e"
        isProfileVerified:
          type: boolean
          nullable: true
          description: Whether the user profile is verified.

    TableSchema:
      type: object
      description: >-
        Database table schema returned by the workspace-databases endpoint.
        Contains the table name and an array of column definitions.
      properties:
        table_name:
          type: string
          description: Name of the database table.
          example: "Transaction"
        columns:
          type: array
          description: Column definitions for the table.
          items:
            type: object
            properties:
              name:
                type: string
                description: Column name.
                example: "amount"
              data_type:
                type: string
                description: PostgreSQL data type of the column.
                example: "character varying"

    Table:
      type: object
      description: >-
        Database table metadata returned by the workspace-db-tables endpoint.
        Includes row/column counts and an optional embedded schema.
      properties:
        id:
          type: integer
          description: Numeric table ID.
          example: 1654
        workspaceId:
          type: integer
          description: Workspace this table belongs to.
          example: 256
        tableName:
          type: string
          description: Name of the database table.
          example: "Transaction"
        columnCount:
          type: integer
          description: Number of columns in the table.
          example: 15
        rowCount:
          type: integer
          description: Number of rows in the table.
          example: 8
        data:
          type: object
          nullable: true
          description: Optional embedded data including schema definition.
          properties:
            schema:
              type: array
              description: Column schema definitions with type and nullability info.
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Column name.
                    example: "amount"
                  type:
                    type: string
                    description: PostgreSQL data type.
                    example: "real"
                  default:
                    type: string
                    nullable: true
                    description: Default value expression.
                  is_nullable:
                    type: string
                    description: Whether the column allows NULL values.
                    enum: ["YES", "NO"]
        createdById:
          type: integer
          nullable: true
          description: User ID of the table creator.
        isActive:
          type: boolean
          description: Whether the table is active.
          example: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-01-05T11:08:59.950711Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-02-23T06:49:23.626346Z"

    DriveFile:
      type: object
      description: A file or folder entry in the workspace S3 drive storage.
      properties:
        id:
          type: integer
          description: Numeric file/folder ID.
          example: 32397
        fileName:
          type: string
          description: File or folder name.
          example: "report.csv"
        fileExtension:
          type: string
          nullable: true
          description: File extension (null for folders).
          example: "csv"
        fileSize:
          type: integer
          nullable: true
          description: File size in bytes (null for folders).
          example: 1128
        mimeType:
          type: string
          nullable: true
          description: MIME type of the file (null for folders).
          example: "text/csv"
        parentFolder:
          type: string
          nullable: true
          description: Parent folder path (null for root-level items).
        isFolder:
          type: boolean
          description: Whether this entry is a folder.
          example: false
        s3Key:
          type: string
          description: Full S3 object key path.
          example: "production/workspace_256/report.csv"
        workspaceId:
          type: integer
          description: Workspace this file belongs to.
          example: 256
        uploadedBy:
          type: integer
          nullable: true
          description: User ID who uploaded the file.
        isDeleted:
          type: boolean
          description: Whether the file is soft-deleted.
          example: false
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Soft deletion timestamp.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2025-07-21T11:27:48Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2025-07-21T11:27:48Z"

    VectorGroupSummary:
      type: object
      description: Summary of a vector group (knowledge base) returned in list endpoints.
      properties:
        id:
          type: integer
          description: Numeric vector group ID.
          example: 1528
        title:
          type: string
          description: Display title of the vector group.
          example: "Product Documentation"
        description:
          type: string
          nullable: true
          description: Optional description of the group.
        workspaceId:
          type: integer
          description: Workspace this group belongs to.
          example: 256
        used:
          type: integer
          description: Number of times this group has been used/referenced.
          example: 0
        numVector:
          type: integer
          description: Number of vectors (items) in this group.
          example: 5
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-02-10T03:43:00.469548Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-02-10T03:43:00.469553Z"

    VectorGroup:
      type: object
      description: Detailed vector group object returned by the single-group endpoint.
      properties:
        id:
          type: integer
          description: Numeric vector group ID.
          example: 1528
        title:
          type: string
          description: Display title of the vector group.
          example: "Product Documentation"
        description:
          type: string
          nullable: true
          description: Optional description of the group.
        workspaceId:
          type: integer
          description: Workspace this group belongs to.
          example: 256
        used:
          type: integer
          description: Number of times this group has been used/referenced.
          example: 0
        numVector:
          type: integer
          description: Number of vectors in this group.
          example: 5
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.

    Vector:
      type: object
      description: >-
        A vector (knowledge base item) which can be a Document (file upload),
        Article (text content), or Website (URL crawl).
      properties:
        id:
          type: integer
          description: Numeric vector ID.
          example: 174747
        title:
          type: string
          nullable: true
          description: Optional display title.
        name:
          type: string
          description: Name of the vector item (filename, article name, or URL).
          example: "product-guide.docx"
        type:
          type: string
          description: Source type of the vector.
          enum: [Document, Article, Website]
          example: "Document"
        content:
          type: string
          nullable: true
          description: Inline text content (for Article type).
        url:
          type: string
          nullable: true
          description: Source URL (for Website type).
          example: "https://example.com/"
        file:
          type: string
          nullable: true
          description: S3 file path (for Document type).
          example: "production/workspace_256/vectors/product-guide.docx"
        fileName:
          type: string
          nullable: true
          description: Original file name (for Document type).
          example: "product-guide.docx"
        fileType:
          type: string
          nullable: true
          description: File extension (for Document type).
          example: "docx"
        status:
          type: string
          description: Processing status of the vector.
          enum: [Pending, Processing, Completed, Failed]
          example: "Completed"
        workspaceId:
          type: integer
          description: Workspace this vector belongs to.
          example: 256
        groups:
          type: array
          description: Vector groups this item belongs to.
          items:
            $ref: "#/components/schemas/VectorGroupSummary"
        log:
          type: string
          nullable: true
          description: Processing log message with chunk/section counts.
          example: "Retrieval Handler completed: 35 chunks, 77 sections"
        config:
          type: object
          nullable: true
          description: Optional processing configuration.
        size:
          type: string
          description: Human-readable file size.
          example: "21.8 KB"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-02-11T03:27:33.109897Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-02-11T03:28:18.985060Z"

    VectorSearchResult:
      type: object
      description: A single result from a vector similarity search.
      properties:
        id:
          type: string
          description: Vector chunk ID.
        content:
          type: string
          description: Matched text content.
        score:
          type: number
          format: float
          description: Similarity score (higher is more relevant).
        metadata:
          type: object
          description: Additional metadata about the matched chunk.

    MemberUser:
      type: object
      nullable: true
      description: >-
        User profile details. Null when the member is a pending invitation
        and the invitee has not yet registered.
      properties:
        id:
          type: integer
          description: User ID.
          example: 1234
        email:
          type: string
          format: email
          description: User email address.
          example: "user@example.com"
        fullName:
          type: string
          description: Display name.
          example: "John Doe"
        avatar:
          type: string
          nullable: true
          description: URL or path to avatar image.
          example: "https://example.com/avatar.jpg"
        color:
          type: string
          description: Hex color assigned to the user for UI display.
          example: "#3d58ca"
        credit:
          type: number
          nullable: true
          description: User credit balance (usually null at member level).
        isProfileVerified:
          type: boolean
          nullable: true
          description: Whether the user profile is verified.

    Member:
      type: object
      description: A workspace membership record, including the user profile and workspace summary.
      properties:
        id:
          type: integer
          description: Membership record ID.
          example: 9788
        workspaceId:
          type: integer
          description: ID of the workspace.
          example: 256
        userId:
          type: integer
          nullable: true
          description: User ID. Null for pending invitations where the user has not registered.
          example: 1234
        email:
          type: string
          format: email
          description: Email address of the member or invitee.
          example: "user@example.com"
        role:
          type: string
          description: Role within the workspace.
          enum: [Owner, Administrator, Member]
          example: "Administrator"
        status:
          type: string
          description: Membership status.
          enum: [accept, pending]
          example: "accept"
        isActive:
          type: boolean
          description: Whether the membership is active.
          example: true
        lastLogin:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the member's last login to this workspace.
          example: "2025-11-18T12:52:28.486957Z"
        builders:
          type: array
          nullable: true
          description: Builders assigned to this member (usually null in list response).
          items:
            type: object
        user:
          $ref: "#/components/schemas/MemberUser"
        createdAt:
          type: string
          format: date-time
          description: When the membership was created.
          example: "2025-11-18T12:52:28.486957Z"
        updatedAt:
          type: string
          format: date-time
          description: When the membership was last updated.
          example: "2025-11-18T12:52:28.486962Z"

    ApiKeySummary:
      type: object
      description: API key summary returned when listing keys. Includes the full key value and usage stats.
      properties:
        id:
          type: integer
          description: Numeric API key ID.
          example: 1831
        name:
          type: string
          description: Human-readable name for the API key.
          example: "My_API_Key"
        key:
          type: string
          description: >-
            Full API key value. Format is sk-<hex>. Returned in list responses
            (unlike some APIs that mask the key after creation).
          example: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        numUsed:
          type: integer
          description: Number of times this key has been used.
          example: 15
        lastUsed:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last usage, or null if never used.
          example: "2025-07-21T12:12:02.430586Z"
        userId:
          type: integer
          description: ID of the user who created this key.
          example: 276
        workspaceId:
          type: integer
          description: Workspace this key belongs to.
          example: 256
        createdAt:
          type: string
          format: date-time
          description: When the key was created.
          example: "2025-07-21T11:41:01.106000Z"
        updatedAt:
          type: string
          format: date-time
          description: When the key was last updated.
          example: "2025-07-21T12:12:02.431183Z"

    ApiKey:
      type: object
      description: Full API key object returned on creation. Same structure as ApiKeySummary.
      properties:
        id:
          type: integer
          description: Numeric API key ID.
          example: 1831
        name:
          type: string
          description: Human-readable name for the API key.
          example: "My_API_Key"
        key:
          type: string
          description: Full API key value (shown on creation).
          example: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        numUsed:
          type: integer
          description: Number of times this key has been used (0 on creation).
          example: 0
        lastUsed:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last usage (null on creation).
        userId:
          type: integer
          description: ID of the user who created this key.
          example: 276
        workspaceId:
          type: integer
          description: Workspace this key belongs to.
          example: 256
        createdAt:
          type: string
          format: date-time
          description: When the key was created.
        updatedAt:
          type: string
          format: date-time
          description: When the key was last updated.

    Integration:
      type: object
      description: >-
        A third-party integration or credential configured for the workspace.
        Note: The GET list endpoint returned 404 during testing, so this schema
        is based on the POST creation endpoint and may need refinement once
        the list endpoint becomes available.
      properties:
        id:
          type: string
          description: Integration ID.
          example: "int_abc123"
        type:
          type: string
          description: Integration provider type (e.g. slack, google_sheets, openai).
          example: "slack"
        name:
          type: string
          description: Display name for this integration.
          example: "My Slack Integration"
        config:
          type: object
          description: Provider-specific configuration (credentials, tokens, etc.).
        status:
          type: string
          description: Current status of the integration.
          enum: [active, inactive, error]
          example: "active"

    Product:
      type: object
      description: |
        A subscription product/plan. Contains pricing, credit allocations,
        resource limits, and feature flags for a specific plan tier.
      properties:
        id:
          type: integer
          description: Unique product ID.
          example: 72
        name:
          type: string
          description: Display name of the product/plan.
          example: "Pro Trial"
        internalId:
          type: string
          description: Internal identifier for the product.
          example: "free-trial"
        billingTag:
          type: string
          nullable: true
          description: Billing system tag/reference.
        productType:
          type: string
          description: Type of product billing cycle.
          enum: [lifetime, monthly, yearly]
          example: "lifetime"
        description:
          type: string
          nullable: true
          description: Product description.
        isActive:
          type: boolean
          description: Whether the product is currently available.
          example: true
        price:
          type: number
          format: float
          description: Price of the product.
          example: 0.0
        fixedCredit:
          type: integer
          description: One-time credit allocation when purchasing.
          example: 10000
        monthlyRenewed:
          type: integer
          description: Credits renewed monthly.
          example: 10000
        creditsGranted:
          type: integer
          nullable: true
          description: Total credits granted (if applicable).
        differencePercent:
          type: number
          nullable: true
          description: Discount percentage compared to base price.
        priority:
          type: integer
          description: Display priority/sort order.
          example: 4
        label:
          type: string
          nullable: true
          description: Optional label (e.g. "Popular", "Best Value").
        totalFlowsAmount:
          type: integer
          nullable: true
          description: Maximum number of flows allowed.
        totalTablesAmount:
          type: integer
          nullable: true
          description: Maximum number of tables allowed.
        totalRowsAmount:
          type: integer
          nullable: true
          description: Maximum number of table rows allowed.
        totalPagesAmount:
          type: integer
          nullable: true
          description: Maximum number of pages/documents allowed.
        totalUsersAmount:
          type: integer
          nullable: true
          description: Maximum number of workspace users allowed.
        totalVectorAmount:
          type: integer
          nullable: true
          description: Maximum number of vector groups allowed.
        totalStorageAmount:
          type: integer
          nullable: true
          description: Maximum storage in bytes.
        featureRemoveLogo:
          type: boolean
          description: Whether the plan allows removing Diaflow branding.
          example: true
        featureCustomDomain:
          type: boolean
          description: Whether the plan allows custom domains.
          example: true
        items:
          type: array
          nullable: true
          description: Sub-items or add-ons included in this product.
          items:
            type: object
        createdBy:
          $ref: "#/components/schemas/CreatedByUser"
        createdById:
          type: integer
          description: ID of the user who created this product.
          example: 15
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2025-02-12T03:32:33.808388Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2025-12-19T07:52:57.067011Z"

    # ── Conversation Schemas ──

    ConversationCreateRequest:
      type: object
      required: [builderId, type]
      properties:
        isTest:
          type: boolean
          description: Whether this is a test/preview conversation.
          example: true
        defaultFirstMessage:
          type: array
          items:
            type: string
          description: Default greeting messages to show at the start of the conversation.
          example: ["Hi there! Welcome!"]
        builderId:
          type: integer
          description: The numeric builder ID (not the uniqueId string).
          example: 46954
        type:
          type: string
          enum: [chat, form]
          description: The conversation type matching the builder's interface type.
          example: "chat"
        title:
          type: string
          description: Conversation title, typically an ISO timestamp.
          example: "2026-03-19T09:03:59.188Z"

    Conversation:
      type: object
      properties:
        id:
          type: integer
          description: The conversation ID. Used in subsequent process and process-checks calls.
          example: 180137
        title:
          type: string
          description: Conversation title.
          example: "2026-03-19T09:03:59.188Z"
        builderId:
          type: integer
          description: The numeric builder ID.
          example: 46954
        isRead:
          type: boolean
          description: Whether the conversation has been read by the owner.
          example: false
        type:
          type: string
          description: Conversation type.
          example: "chat"
        isTest:
          type: boolean
          description: Whether this is a test/preview conversation.
          example: true
        createdById:
          type: integer
          description: ID of the user who created the conversation.
          example: 4606
        createdBy:
          type: object
          nullable: true
          description: User object of the creator.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-03-19T09:05:50.256730Z"
        channelId:
          type: string
          format: uuid
          description: Unique channel identifier for the conversation.
          example: "e38bc883-5f1e-40b8-a4b7-b237ee061ce0"
        createdOn:
          type: string
          nullable: true
          description: Platform where the conversation was created.
        lastInteraction:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last interaction.
        totalPrompt:
          type: integer
          description: Total number of prompts/messages in the conversation.
          example: 0
        meta:
          type: object
          nullable: true
          description: Additional metadata.
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-03-19T09:05:50.256733Z"
        via:
          type: string
          description: How the conversation was initiated (e.g., "test", "chat_app", "api").
          example: "test"
        customization:
          type: object
          nullable: true
          description: Custom appearance/behavior settings.
        duration:
          type: number
          nullable: true
          description: Total conversation duration in seconds.

    ConversationProcessRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: The user's message text to send to the flow.
          example: "Hello, I want to buy a shirt"

    ConversationProcessResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
          description: |
            The process session UUID. Same value as `id`.
            Use this to poll via GET /conversations/{conversationId}/process-checks/{sessionId}.
          example: "6d2eea35-b239-468c-8523-0f49034c3fc7"
        id:
          type: string
          format: uuid
          description: The process UUID (same as sessionId).
          example: "6d2eea35-b239-468c-8523-0f49034c3fc7"
        status:
          type: string
          enum: [Processing, Done, Error]
          description: Initial status, always "Processing" when first returned.
          example: "Processing"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when processing started.
          example: "2026-03-18T17:15:33.145166"

    ProcessCheckResponse:
      type: object
      properties:
        status:
          type: string
          enum: [Processing, Done, Error]
          description: |
            Current execution status.
            - "Processing": Flow is still executing, keep polling.
            - "Done": Flow completed successfully.
            - "Error": Flow execution failed.
          example: "Done"
        node:
          type: array
          description: |
            Array of per-node status objects. Each element is an object with a single key
            (the node ID) mapping to the node's execution details. Grows as nodes complete.
          items:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/NodeExecutionStatus"
        result:
          type: object
          description: |
            Detailed execution results keyed by node ID. Contains timing data,
            input/output payloads, and node ordering. Only present for completed nodes.
          additionalProperties:
            $ref: "#/components/schemas/NodeExecutionResult"
        total_step:
          type: integer
          description: Total number of steps/nodes in the flow.
          example: 18
        workspace_id:
          type: integer
          description: The workspace ID.
          example: 256

    NodeExecutionStatus:
      type: object
      description: Real-time status of a single node during execution.
      properties:
        status:
          type: string
          enum: [Done, Error, Processing]
          description: Node execution status.
          example: "Done"
        time:
          type: number
          description: Execution time in seconds for this node.
          example: 0.007
        metaContent:
          type: string
          description: Human-readable description of the node's action.
          example: "Get value from input"
        message:
          type: string
          nullable: true
          description: Error message if the node failed, null otherwise.
          example: null
        output:
          description: The node's output data. Shape varies by node type.
        input:
          description: The node's input data. Shape varies by node type.

    NodeExecutionResult:
      type: object
      description: Detailed execution result for a completed node.
      properties:
        start:
          type: number
          description: Unix timestamp when the node started executing.
          example: 1773911159.26
        end:
          type: number
          description: Unix timestamp when the node finished executing.
          example: 1773911159.27
        latency:
          type: number
          description: Execution latency in seconds.
          example: 0.007
        input_cf:
          type: object
          description: The node's configuration and input data.
        node_order:
          type: integer
          description: The order in which this node was executed (0-indexed).
          example: 0
        input:
          type: string
          nullable: true
          description: The input text/data passed to this node.
        advanced_chat_attachment:
          type: array
          nullable: true
          description: Advanced chat attachments if any.
          items:
            type: object
        attachment:
          type: array
          nullable: true
          description: File attachments if any.
          items:
            type: object
