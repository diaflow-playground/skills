          example: "openrouterc"
        data:
          type: object
          nullable: true
          description: Additional component configuration data.
        selected:
          type: boolean
          nullable: true
          description: Whether the component is currently selected in the UI.
        isRoot:
          type: boolean
          description: Whether this component can be a root/trigger node.
          example: true
        infoLink:
          type: string
          nullable: true
          description: URL to the component's documentation page.
          example: "https://docs.diaflow.io/flows/component-reference/public-ai-llm-models/openrouter"
        diagnostics:
          type: string
          nullable: true
          description: Diagnostic information or notes about the component.
        isPipedream:
          type: boolean
          description: Whether this is a Pipedream-powered integration.
          example: false
        pipedreamSlugName:
          type: string
          nullable: true
          description: Pipedream integration slug name (if isPipedream is true).
          example: "slack"
        pipedreamAppId:
          type: string
          nullable: true
          description: Pipedream application ID.
          example: "app_OkrhR1"
        pipedreamUnit:
          type: string
          nullable: true
          description: Unit of measurement for Pipedream pricing (e.g. "request").
          example: "request"
        pipedreamInputCredit:
          type: number
          nullable: true
          description: Credit cost per input for Pipedream components.
          example: 0
        pipedreamOutputCredit:
          type: number
          nullable: true
          description: Credit cost per output for Pipedream components.
          example: 2
        priority:
          type: integer
          nullable: true
          description: Sort priority for display ordering.
          example: 173
        isActive:
          type: boolean
          description: Whether the component is currently available for use.
          example: true
        createdById:
          type: integer
          description: ID of the admin user who created this component.
          example: 15
        createdBy:
          $ref: "#/components/schemas/CreatedByUser"
        numAction:
          type: integer
          description: Number of actions/operations this component supports.
          example: 0
        isExpand:
          type: boolean
          nullable: true
          description: Whether the component is expanded in the UI by default.
        pipedreamData:
          type: object
          nullable: true
          description: Additional Pipedream-specific configuration data.
        categories:
          type: array
          description: Categories this component belongs to.
          items:
            $ref: "#/components/schemas/ComponentCategory"
        createdAt:
          type: string
          format: date-time
          description: When this component was created.
          example: "2025-04-09T14:50:12.252721Z"
        updatedAt:
          type: string
          format: date-time
          description: When this component was last updated.
          example: "2025-11-26T04:38:52.425420Z"

    ComponentCategory:
      type: object
      description: A category grouping for components.
      properties:
        id:
          type: integer
          description: Category ID.
          example: 122
        name:
          type: string
          description: Category display name.
          example: "Public AI/LLM Models"
        icon:
          type: string
          nullable: true
          description: Path or URL to the category icon.
          example: "public/production/admin/component-categories/icon/key-regular.svg"
        description:
          type: string
          nullable: true
          description: Category description.
        note:
          type: string
          nullable: true
          description: Additional notes about the category.
        status:
          type: string
          nullable: true
          description: Category status.
        priority:
          type: integer
          description: Sort priority for display ordering.
          example: 7
        isActive:
          type: boolean
          description: Whether the category is active.
          example: true
        numComponent:
          type: integer
          description: Number of components in this category.
          example: 12
        isExpand:
          type: boolean
          description: Whether the category is expanded by default in the UI.
          example: false
        createdById:
          type: integer
          description: ID of the admin who created this category.
        createdBy:
          $ref: "#/components/schemas/CreatedByUser"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModelConfig:
      type: object
      description: Configuration for an AI model within a provider.
      properties:
        name:
          type: string
          description: Human-readable model name (may be absent for some providers like OpenAI).
          example: "Claude 4 Sonnet"
        model:
          type: string
          description: Model identifier used in API calls.
          example: "claude-4-sonnet-20250514"
        is_active:
          type: boolean
          description: Whether this model is currently available.
          example: true
        is_memory:
          type: boolean
          description: Whether this model supports conversation memory/context.
          example: true
        max_token:
          type: integer
          description: Maximum token limit for this model.
          example: 120000
        model_type:
          type: string
          description: Type of model (e.g. "chat", "multimodal", "gpt-5", "image").
          example: "chat"
        description:
          type: string
          description: Brief description of the model's capabilities.
          example: "Smaller, faster variant offering excellent balance between speed and capability."
        file_formats:
          type: array
          description: Supported file formats for upload.
          items:
            type: string
          example: [".jpg,.jpeg", ".png", ".webp", ".docx", ".txt", ".pdf", ".srt"]
        params:
          type: object
          description: Additional model parameters (e.g. speed/intelligence ratings).
          properties:
            speed:
              type: integer
              description: Speed rating (1-5).
              example: 4
            intelligence:
              type: integer
              description: Intelligence/capability rating (1-5).
              example: 4

    ComponentPricing:
      type: object
      description: Pricing information for a single component.
      properties:
        node_id:
          type: string
          description: Component node identifier.
          example: "gemini"
        prices:
          type: object
          description: Pricing tiers keyed by model name.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/PriceEntry"

    PriceEntry:
      type: object
      description: A single pricing entry for a component model variant.
      properties:
        id:
          type: integer
          description: Price entry ID.
          example: 67
        node_id:
          type: string
          description: Component node identifier.
          example: "gemini"
        unit:
          type: string
          description: Billing unit (e.g. "token", "request", "second", "image").
          example: "token"
        model:
          type: string
          description: Model identifier this price applies to.
          example: "gemini-2.5-flash"
        input_cost:
          type: number
          format: double
          description: Cost per unit for input.
          example: 0.0001
        output_cost:
          type: number
          format: double
          description: Cost per unit for output.
          example: 0.0002
        variant:
          type: string
          nullable: true
          description: Price variant qualifier (e.g. ">128k token").
        is_active:
          type: boolean
          description: Whether this pricing tier is currently active.
