        bio:
          type: string
          nullable: true
          description: User's biography/about text.
          example: "AI workflow enthusiast"
        followersCount:
          type: integer
          description: Number of followers.
          example: 42
        followingCount:
          type: integer
          description: Number of users being followed.
          example: 15
        templatesCount:
          type: integer
          description: Number of published templates.
          example: 3
        createdAt:
          type: string
          format: date-time
          description: Profile creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.

