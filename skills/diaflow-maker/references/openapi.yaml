    # ── Builder Schemas ──

    CreatedByUser:
      type: object
      description: Summary of the user who created the builder.
      properties:
        id:
          type: integer
          description: User ID.
          example: 276
        email:
          type: string
          format: email
          description: User's email address.
          example: "user@example.com"
        fullName:
          type: string
          description: User's display name.
          example: "User Name"
        avatar:
          type: string
          nullable: true
          description: URL to the user's avatar image.
        color:
          type: string
          description: Hex color assigned to the user.
          example: "#9c899e"
        credit:
          type: integer
          nullable: true
        isProfileVerified:
          type: boolean
          nullable: true

    Connector:
      type: object
      description: An edge/connection between two nodes in the flow graph.
      properties:
        id:
          type: string
          description: Unique edge identifier.
          example: "edge-1760342277204"
        source:
          type: string
          description: Source node ID.
          example: "trigger"
        sourceHandle:
          type: string
          nullable: true
          description: Source handle (for nodes with multiple outputs).
        target:
          type: string
          description: Target node ID.
          example: "openai-0"
        targetHandle:
          type: string
          nullable: true
          description: Target handle (for nodes with multiple inputs).
        animated:
          type: boolean
          description: Whether the edge is animated in the UI.
          example: true
        type:
          type: string
          description: Edge rendering type.
          example: "smoothstep"

    FlowNode:
      type: object
      description: A node in the flow graph (trigger, LLM, tool, output, etc.).
      properties:
        id:
          type: string
          description: Node identifier within the flow.
          example: "openai-0"
        width:
          type: integer
          description: Node width in pixels.
          example: 334
        height:
          type: integer
          description: Node height in pixels.
          example: 645
        type:
          type: string
          description: Node component type (e.g. trigger, openai, output, branch, google_sheets_p, py, json-formatter, pdf-img, ddb).
          example: "openai"
        cusNodeType:
          type: string
          nullable: true
          description: Custom node type override.
        position:
          type: object
          description: Node position in the canvas.
          properties:
            x:
              type: number
            y:
              type: number
        data:
          type: object
          description: Node-specific configuration (model, prompt, system message, config, etc.).
        positionAbsolute:
          type: object
          description: Absolute position in the canvas.
          properties:
            x:
              type: number
            y:
              type: number
        idNode:
          type: string
          description: Globally unique node identifier with UUID suffix.
          example: "openai-0-c140522a-ffe7-48f3-a770-d46081e51e40"

    BuilderData:
      type: object
      description: The flow graph data containing all nodes and connectors.
      properties:
        connectors:
          type: array
          description: Edges connecting nodes in the flow.
          items:
            $ref: "#/components/schemas/Connector"
        nodes:
          type: array
          description: All nodes in the flow.
          items:
            $ref: "#/components/schemas/FlowNode"

    BuilderAudit:
      type: object
      description: Last test/audit result for the builder.
      nullable: true
      properties:
        node:
          type: array
          description: Per-node audit results.
          items:
            type: object
        status:
          type: string
          description: Overall audit status.
          enum: [Done, Error]

    InlineInterfaceSummary:
      type: object
      description: Inline interface summary returned with builder list items.
      nullable: true
      properties:
        builderCode:
          type: string
          description: Builder uniqueId this interface belongs to.
          example: "Dx6c64YWYk"
        name:
          type: string
          description: Interface display name.
        botLogo:
          type: string
          nullable: true
        primaryColor:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastInteraction:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
          nullable: true

    InlineChatInterfaceSummary:
      type: object
      description: Inline chat interface summary returned with builder list items.
      nullable: true
      properties:
        builderCode:
          type: string
          description: Builder uniqueId this chat interface belongs to.
          example: "Dx6c64YWYk"
        logo:
          type: string
          nullable: true
        title:
          type: string
          description: Chat interface title.
        linkedFlow:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastInteraction:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
          nullable: true

    Builder:
      type: object
      description: |
        A flow builder object. Contains the full flow graph in the data field,
        builder metadata, and optional inline interface summaries.
      properties:
        id:
          type: integer
          description: Numeric builder ID.
          example: 38288
        uniqueId:
          type: string
          description: Alphanumeric unique identifier used in URLs and API paths.
          example: "pEBHQNskat"
        title:
          type: string
          description: Display name of the builder.
          example: "My Chatbot"
        workspaceId:
          type: integer
          description: Workspace this builder belongs to.
          example: 256
        interfaceType:
          type: string
          description: Builder interface type.
          enum: [form, chat, automation, scheduled]
          example: "chat"
        triggerType:
          type: string
          description: How the flow is triggered.
          example: "inputs"
        version:
          type: string
          description: Builder version status.
          enum: [draft, publish]
          example: "draft"
        isActive:
          type: boolean
          description: Whether the builder is active.
          example: true
        enableAccess:
          type: boolean
          description: Whether public access is enabled.
          example: false
        enableApi:
          type: boolean
          description: Whether API execution is enabled.
          example: false
        isSubflow:
          type: boolean
          description: Whether this builder is used as a subflow.
          example: false
        webhookEnable:
          type: boolean
          description: Whether webhook trigger is enabled.
          example: false
        webhookExpire:
          type: string
          format: date-time
          nullable: true
          description: Webhook expiration time.
        webhookInput:
          type: object
          nullable: true
          description: Webhook input configuration.
        isInternalApp:
          type: boolean
          nullable: true
          description: Whether this is an internal app.
        mode:
          type: string
          nullable: true
          description: Builder mode.
        plan:
          type: string
          nullable: true
          description: Associated plan.
        templateId:
          type: integer
          nullable: true
          description: Template ID if created from a template.
        chatBotId:
          type: string
          nullable: true
          description: Associated chatbot ID.
        resultConfiguration:
          type: object
          nullable: true
          description: Result configuration settings.
        note:
          type: string
          nullable: true
          description: Builder notes.
        simpleChatData:
          type: object
          nullable: true
          description: Simple chat mode data.
        metaData:
          type: object
          nullable: true
          description: Additional metadata (e.g. is_new_version flag).
        createdById:
          type: integer
          description: User ID of the creator.
          example: 276
        data:
          $ref: "#/components/schemas/BuilderData"
        audit:
          $ref: "#/components/schemas/BuilderAudit"
        createdBy:
          $ref: "#/components/schemas/CreatedByUser"
        interface:
          $ref: "#/components/schemas/InlineInterfaceSummary"
        interfaceChat:
          $ref: "#/components/schemas/InlineChatInterfaceSummary"
        runCount:
          type: integer
          description: Total number of executions.
          example: 0
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2025-11-18T12:52:28.486957Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2025-11-18T12:52:28.486962Z"

    PaginatedBuilders:
      type: object
      description: Paginated response for builder listings.
      properties:
        total:
          type: integer
          description: Total number of builders matching the query.
          example: 154
        results:
          type: array
          description: Array of builder objects for the current page.
          items:
            $ref: "#/components/schemas/Builder"

    ExecutionResult:
      type: object
      properties:
        runId:
          type: string
        status:
          type: string
        output:
          type: object

    # ── Interface Schemas ──

    InterfaceComponent:
      type: object
      description: A UI component in the interface (input field or output display).
      properties:
        id:
          type: string
          description: Component identifier.
          example: "1760502826936"
        error:
          type: boolean
          description: Whether this component has an error.
          example: false
        title:
          type: string
          description: Component display label.
          example: "Legal"
        value:
          type: string
          description: Component value or template expression.
          example: "{{}}"
        result:
          type: object
          nullable: true
          description: Last execution result for this component.
        is_done:
          type: boolean
          description: Whether the component has completed.
          example: false
        node_type:
          type: string
          description: "Node type: fixed, custom, etc."
          example: "fixed"
        config_type:
          type: string
          description: "Configuration type: output, input."
          example: "output"
        output_type:
          type: string
          description: "Output rendering type: text, image, table, etc."
          example: "text"
        is_formatted:
          type: boolean
          description: Whether the output should be formatted (e.g. Markdown).
          example: true
        error_message:
          type: string
          description: Error message if component failed.
          example: ""
        input_type:
          type: string
          description: Input field type (for input components).
          example: "long_text"
        input_label:
          type: string
          description: Label for the input field.
          example: "Input"
        placeholder:
          type: string
          description: Placeholder text for the input field.
          example: "Enter content"
        default_value:
          type: string
          nullable: true
          description: Default value for the input field.
        variable_name:
          type: string
          description: Variable name for referencing this component in the flow.
          example: "input"

    Interface:
      type: object
      description: |
        Form/app interface configuration for a published builder.
        Contains display settings, component definitions, and the embedded builder flow.
      properties:
        id:
          type: integer
          description: Interface record ID.
          example: 4294
        name:
          type: string
          description: Interface display name.
          example: "App #Dx6c64YWYk"
        primaryColor:
          type: string
          nullable: true
          description: Primary theme color (hex).
        buttonTheme:
          type: string
          nullable: true
          description: Button theme style.
        widgetTheme:
          type: string
          nullable: true
          description: Widget theme style.
        botLogo:
          type: string
          nullable: true
          description: URL of the bot logo image.
        banner:
          type: string
          nullable: true
          description: URL of the banner image.
        welcomeMessage:
          type: string
          nullable: true
          description: Welcome message displayed to users.
        isHidePowered:
          type: boolean
          description: Whether to hide the "Powered by Diaflow" branding.
          example: false
        component:
          type: array
          description: UI components (inputs and outputs) for the interface.
          items:
            $ref: "#/components/schemas/InterfaceComponent"
        builderCode:
          type: string
          description: Builder uniqueId this interface belongs to.
          example: "Dx6c64YWYk"
        security:
          type: string
          description: Access security level.
          enum: [public, private]
          example: "public"
        lastInteraction:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last user interaction.
        description:
          type: string
          nullable: true
          description: Interface description.
        builder:
          $ref: "#/components/schemas/Builder"
        newVersion:
          type: boolean
          nullable: true
          description: Whether a new version is pending publish.

    ChatInterface:
      type: object
      description: |
        Chat widget interface configuration for a published builder.
        Contains full chat widget styling, welcome messages, opening questions,
        customer data collection settings, and the embedded builder flow.
      properties:
        id:
          type: integer
          description: Chat interface record ID.
          example: 4192
        linkedFlow:
          type: string
          nullable: true
          description: Linked flow identifier.
        title:
          type: string
          description: Chat window title.
          example: "App #Dx6c64YWYk"
        tagline:
          type: string
          description: Chat window tagline/subtitle.
          example: "Dazzle your customer with super-charged chatbot"
        logo:
          type: string
          nullable: true
          description: URL of the chat logo image.
        cover:
          type: string
          nullable: true
          description: URL of the chat cover image.
        widgetTheme:
          type: string
          description: Widget visual theme.
          example: "creative"
        primaryColor:
          type: string
          description: Primary theme color (hex).
          example: "#F4F2EE"
        isHidePowered:
          type: boolean
          description: Whether to hide the "Powered by Diaflow" branding.
          example: false
        callToActionButton:
          type: string
          description: Text on the chat trigger button.
          example: "Hi there! 👋"
        callToActionButtonSubtitle:
          type: string
          description: Subtitle text below the trigger button.
          example: "Chat with us"
        isShowContact:
          type: boolean
          description: Whether to show contact information.
          example: true
        contactInfo:
          type: object
          nullable: true
          description: Contact information configuration.
        isAskCustomerInformation:
          type: boolean
          description: Whether to collect customer information before chat.
          example: true
        hasAllowChatAsGuest:
          type: boolean
          description: Whether guests can chat without providing info.
          example: true
        dataToCollect:
          type: array
          description: Fields to collect from the user.
          items:
            type: object
        welcomeMessage:
          type: string
          description: Welcome message in the chat window.
          example: "Hi there! 👋 I'm here to help you."
        initialQuestion:
          type: array
          description: Initial question suggestions.
          items:
            type: object
            properties:
              value:
                type: string
        isMixUpQuestion:
          type: boolean
          description: Whether to randomize the order of opening questions.
          example: false
        component:
          type: array
          description: UI components for the chat interface.
          items:
            $ref: "#/components/schemas/InterfaceComponent"
        inputNode:
          type: object
          nullable: true
          description: Input node configuration for the chat trigger.
          properties:
            id:
              type: integer
              description: Input component ID.
              example: 1760502714252
            value:
              type: string
              nullable: true
              description: Default value.
            input_type:
              type: string
              description: Input field type.
              example: "long_text"
            input_label:
              type: string
              description: Input field label.
              example: "Input"
            placeholder:
              type: string
              description: Input placeholder text.
              example: "Enter content"
            default_value:
              type: string
              nullable: true
              description: Default value for the input.
            variable_name:
              type: string
              description: Variable name for referencing in the flow.
              example: "input"
        builderCode:
          type: string
          description: Builder uniqueId this chat interface belongs to.
          example: "Dx6c64YWYk"
        security:
          type: string
          description: Access security level.
          enum: [public, private]
          example: "public"
        lastInteraction:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last user interaction.
        whitelist:
          type: array
          nullable: true
          description: Whitelisted domains for embedding.
          items:
            type: string
        description:
          type: string
          nullable: true
          description: Chat interface description.
        openingQuestions:
          type: array
          nullable: true
          description: Pre-defined opening question suggestions.
          items:
            type: string
        metaData:
          type: object
          nullable: true
          description: Widget display metadata (position, button style, margins).
          properties:
            prominenceType:
              type: string
              description: Widget prominence style.
              example: "button_and_text"
            prominenceText:
              type: string
              description: Prominence text displayed alongside button.
              example: "👋 Hello there! How can we help you?"
            buttonDisplay:
              type: string
              description: Button display mode.
              example: "icon_only"
            position:
              type: string
              description: Widget position on screen.
              example: "right"
            marginDesktop:
              type: string
              description: Desktop margin in pixels.
              example: "20"
            marginMobile:
              type: string
              description: Mobile margin in pixels.
              example: "20"
            widgetIcon:
              type: string
              nullable: true
              description: Custom widget icon URL.
            buttonText:
              type: string
              description: Button label text.
              example: "Chat now"
        builder:
          $ref: "#/components/schemas/Builder"

    # ── History Schemas ──

    HistoryNodeAction:
      type: object
      description: Per-node execution result within a history record.
      properties:
        id:
          type: string
          description: Node ID.
          example: "ddb-0"
        node:
          type: string
          description: Node component type.
          example: "ddb"
        start:
          type: number
          format: double
          description: Unix timestamp when node execution started.
        end:
          type: number
          format: double
          description: Unix timestamp when node execution ended.
        latency:
          type: number
          format: double
          description: Node execution duration in seconds.
          example: 1.17
        status:
          type: string
          description: Node execution status.
          example: "Successful"
        error:
          type: string
          nullable: true
          description: Error message if node failed.
        model:
          type: string
          description: AI model used (if applicable).
          example: "gpt-4o-mini"
        credit:
          type: integer
          description: Credits consumed by this node.
          example: 0
        input:
          type: object
          description: Input data passed to the node.
        output:
          type: object
          description: Output data produced by the node.
        query:
          type: string
          nullable: true
          description: SQL or search query generated (for database/search nodes).
        input_token:
          type: integer
          description: Number of input tokens (for LLM nodes).
          example: 373
        output_token:
          type: integer
          description: Number of output tokens (for LLM nodes).
          example: 72
        node_order:
          type: integer
          description: Execution order of this node.
          example: 1

    HistoryBuilderRef:
      type: object
      description: Reference to the builder that was executed.
      properties:
        title:
          type: string
          description: Builder display name.
          example: "App #2cz0BxX413"
        uniqueId:
          type: string
          description: Builder unique identifier.
          example: "2cz0BxX413"
        interfaceType:
          type: string
          description: Builder interface type (e.g. form, chat, scheduled, api).
          example: "form"
        isInternalApp:
          type: boolean
          nullable: true
          description: Whether this is an internal (non-public) app.
        version:
          type: string
          nullable: true
          description: Builder version that was executed (e.g. "draft", "published").
          example: "draft"
        interface:
          type: object
          nullable: true
          description: Interface configuration object (if applicable).
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the builder was deleted, or null if active.

    HistoryApiKey:
      type: object
      description: API key that triggered the execution (if applicable).
      nullable: true
      properties:
        id:
          type: integer
          description: API key ID.
          example: 1831
        name:
          type: string
          description: API key display name.
          example: "My API Key"
        key:
          type: string
          description: The API key value.
          example: "sk-1fa7ff22a4154b22b24a59f070d9ca9d"
        numUsed:
          type: integer
          description: Number of times this key has been used.
          example: 15
        lastUsed:
          type: string
          format: date-time
          description: Timestamp of last usage.
        userId:
          type: integer
        workspaceId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HistorySummary:
      type: object
      description: A single execution history record.
      properties:
        id:
          type: integer
          description: Numeric history record ID.
          example: 370391
        sessionId:
          type: string
          format: uuid
          description: Unique session identifier for the execution.
          example: "ec5d16ee-f5af-4037-9633-811248829c00"
        builderId:
          type: integer
          description: Numeric ID of the executed builder.
          example: 28020
        templateId:
          type: integer
          nullable: true
          description: Template ID if builder was from a template.
        userId:
          type: integer
          description: User ID who triggered the execution.
          example: 276
        workspaceId:
          type: integer
          description: Workspace ID.
          example: 256
        status:
          type: string
          description: Execution status.
          enum: [Completed, Error, Running, Cancelled]
          example: "Completed"
        section:
          type: string
          description: Where the execution was triggered from.
          example: "Preview on website"
        input:
          type: object
          nullable: true
          description: Input data provided to the flow.
        output:
          type: object
          nullable: true
          description: Output data from the flow. Contains a data field with the results.
        models:
          type: array
          description: AI models used during execution.
          items:
            type: string
          example: ["gpt-4o-mini"]
        latency:
          type: number
          format: double
          description: Total execution latency in seconds.
          example: 0.23
        logType:
          type: string
          description: Type of execution log.
          example: "webhook"
        via:
          type: string
          description: "Trigger channel (e.g. Webhook, Public App, Internal App, Test, API)."
          example: "Webhook"
        credit:
          type: integer
          description: Total credits consumed.
          example: 0
        totalConversation:
          type: integer
          description: Total conversation count (for chat-type builders).
          example: 0
        start:
          type: string
          format: date-time
          description: Execution start timestamp.
          example: "2025-07-21T12:12:02.483773Z"
        end:
          type: string
          format: date-time
          description: Execution end timestamp.
          example: "2025-07-21T12:12:02.712821Z"
        meta:
          type: object
          nullable: true
          description: Execution metadata.
          properties:
            config:
              type: object
              description: Builder configuration snapshot.
              properties:
                title:
                  type: string
                unique_id:
                  type: string
                interface_type:
                  type: string
        action:
          type: object
          description: |
            Per-node action results keyed by node ID.
            Each value is a HistoryNodeAction object.
          additionalProperties:
            $ref: "#/components/schemas/HistoryNodeAction"
        builder:
          $ref: "#/components/schemas/HistoryBuilderRef"
        user:
          type: object
          description: User who triggered the execution.
          properties:
            id:
              type: integer
              description: User ID.
              example: 276
            email:
              type: string
              format: email
              description: User's email address.
              example: "user@example.com"
            fullName:
              type: string
              description: User's display name.
              example: "User Name"
            avatar:
              type: string
              nullable: true
              description: URL to the user's avatar image.
              example: "https://example.com/avatar.jpg"
            color:
              type: string
              description: Hex color assigned to the user.
              example: "#9c899e"
            credit:
              type: number
              nullable: true
              description: User's remaining credit balance.
            isProfileVerified:
              type: boolean
              nullable: true
              description: Whether the user's profile is verified.
        apiKey:
          $ref: "#/components/schemas/HistoryApiKey"
        createdAt:
          type: string
          format: date-time
          example: "2025-07-21T12:12:02.531605Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-07-21T12:12:02.725320Z"

    HistoryDetail:
      description: |
        Execution history detail. Has the same shape as HistorySummary
        (the list and detail endpoints return the same object structure).
        The action map contains full per-node execution data including input/output payloads.
      allOf:
        - $ref: "#/components/schemas/HistorySummary"

    PaginatedHistories:
      type: object
      description: Paginated response for execution history listings.
      properties:
        total:
          type: integer
          description: Total number of history records matching the query.
          example: 334
        results:
          type: array
          description: Array of history records for the current page.
          items:
            $ref: "#/components/schemas/HistorySummary"

    Component:
      type: object
      description: A flow node component type (AI model, integration, utility, etc.).
      properties:
        id:
          type: integer
          description: Numeric component ID.
          example: 225
        icon:
          type: string
          nullable: true
          description: URL or path to the component icon image.
