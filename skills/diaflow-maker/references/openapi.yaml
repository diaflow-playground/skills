        isActive:
          type: boolean
          description: Whether the announcement is currently active.
          example: true
        createdBy:
          $ref: "#/components/schemas/CreatedByUser"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: "2026-03-17T04:40:20.485874Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-03-17T04:40:20.485879Z"

