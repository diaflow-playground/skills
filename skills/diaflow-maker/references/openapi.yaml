        priority:
          type: integer
          nullable: true
          description: Display priority ordering.
          example: 8
        created_at:
          type: string
          format: date-time
          description: When this price entry was created.
        updated_at:
          type: string
          format: date-time
          description: When this price entry was last updated.
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: When this price entry was soft-deleted, or null if active.

    TemplateCategory:
