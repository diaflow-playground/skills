          description: Minimum plan required to use this template.
          enum: [BASIC, PRO, ENTERPRISE]
          example: "BASIC"
        data:
          type: object
          description: Flow graph data containing nodes and connectors.
          properties:
            nodes:
              type: array
              description: Flow nodes in the template.
