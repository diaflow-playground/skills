        validTo:
          type: string
          format: date-time
          nullable: true
          description: Subscription end date (null = no expiry).
        nextBilling:
          type: string
          format: date-time
          nullable: true
          description: Next billing date.
        nextResetCreditDate:
          type: string
          format: date-time
          description: Next credit reset date.
          example: "2026-04-04T12:07:33.790992Z"
        nextPriceId:
          type: string
          nullable: true
          description: Next billing price ID (for plan changes).
        nextPackageId:
          type: string
          nullable: true
          description: Next package ID (for plan changes).
        nextProductId:
          type: string
          nullable: true
          description: Next product ID (for plan changes).
        createdAt:
          type: string
          format: date-time
          description: Subscription creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: Last subscription update timestamp.
        productId:
          type: integer
          description: Current product/plan ID.
          example: 72
        priceId:
          type: string
          nullable: true
          description: Current price ID.
        packageId:
          type: string
          nullable: true
          description: Current package ID.
        status:
          type: string
          description: Subscription status.
